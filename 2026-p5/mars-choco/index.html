*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0000A0;--navy-d:#000070;--teal:#E6A000;--accent:#BA0C2F}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:#fff;-webkit-font-smoothing:antialiased;
  background:radial-gradient(1200px 700px at 75% -10%,#21356f 0%,var(--navy) 38%,var(--navy-d) 100%);
  min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px 20px;
}
.wrap{width:100%;max-width:1060px;display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center}
.brandbar{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.brandbar .b{font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase}
.brandbar .aurora{color:#fff}
.brandbar .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.brandbar .ever{color:#9fb0d6}
.eyebrow{font-size:13px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:#9fb0d6;margin-bottom:14px}
h1{font-size:clamp(40px,7vw,68px);font-weight:800;line-height:1.02;letter-spacing:-.02em}
.rule{width:120px;height:4px;border-radius:2px;background:var(--accent);margin:22px 0}
.period{font-size:clamp(20px,3.4vw,28px);font-weight:500;color:#d7e0f4}
.desc{margin-top:22px;max-width:430px;font-size:15.5px;line-height:1.6;color:#b9c5e2;font-weight:400}
.tags{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
.tag{font-size:12px;font-weight:600;letter-spacing:.04em;padding:6px 13px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#cdd7ef}
.cta{margin-top:34px;display:flex;flex-wrap:wrap;gap:14px}
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 26px;border-radius:14px;text-decoration:none;
  font-size:15px;font-weight:700;letter-spacing:.01em;transition:transform .15s,box-shadow .15s,background .15s}
.btn svg{width:19px;height:19px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 12px 28px rgba(240,116,0,.32)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(240,116,0,.42)}
.btn-ghost{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.22)}
.btn-ghost:hover{background:rgba(255,255,255,.13);transform:translateY(-2px)}
.footer{margin-top:42px;font-size:12.5px;color:#8092bd;line-height:1.7}
.footer b{color:#cdd7ef;font-weight:600}
.preview{justify-self:center}
.preview .frame{border-radius:14px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);
  transform:rotate(2deg);transition:transform .3s}
.preview .frame:hover{transform:rotate(0)}
.preview img{display:block;width:100%;max-width:330px}
.preview .cap{text-align:center;margin-top:16px;font-size:12px;color:#8092bd;letter-spacing:.04em}
@media(max-width:820px){
  body{align-items:flex-start;padding:28px 18px}
  .wrap{margin:auto;width:100%;display:flex;flex-direction:column;gap:16px;text-align:center}
  .intro{display:contents}
  .brandbar{order:1;justify-content:center;margin-bottom:0}
  .eyebrow{order:2;margin-bottom:0}
  h1{order:3}
  .rule{order:4;margin:0 auto}
  .period{order:5}
  .preview{order:6;margin:0}
  .desc{order:7;margin:0 auto}
  .tags{order:8;justify-content:center;margin:0}
  .cta{order:9;justify-content:center;margin:0}
  .footer{order:10;text-align:center;margin:0}
  .preview .frame{transform:none}
  .preview img{max-width:260px}
}
